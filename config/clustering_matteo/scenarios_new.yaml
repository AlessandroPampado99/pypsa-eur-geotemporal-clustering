# This file is used to define the scenarios that are run by snakemake. Each entry on the first level is a scenario. Each scenario can contain configuration overrides with respect to the config/config.yaml settings.
#
# Example
#
# custom-scenario: # name of the scenario
#   electricity:
#       renewable_carriers: [wind, solar] # override the list of renewable carriers

# gtb-{lambda}-{K}-{init}-{beta}
# gtb = geo-temporal budget
# {lambda} = lambda_ts
# {K} = max_total_steps
# {init} = bal oppure full
# {beta} = valore di beta

gtb-0.20-900-bal-0.15:
  clustering:
    geotemporal:
      reducer:
        lambda_ts: 0.20
        normalize: "zscore"
        max_total_steps: 900
        init_mode: "balanced"
        init_nodes: null
        init_days: null
        beta: 0.15
        max_iter: 50
        tol_no_change: 5
        objective_tol_rel: 1e-5
        verbose: true
        norm_q: 0.95
        kmedoids_max_iter: 100
        random_state: 0

